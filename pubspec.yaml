name: mediconnect
description: "Integrated Digital Healthcare Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 Firebase Core
  firebase_core: ^3.6.0

  # 🔥 Authentication
  firebase_auth: ^5.3.1

  # 🔥 Firestore Database
  cloud_firestore: ^5.4.4

  # 🔥 Push Notifications (Caregiver alerts)
  firebase_messaging: ^15.1.3

  # 🔥 Local Notifications (Medicine reminder)
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true